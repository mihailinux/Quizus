<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embedded Systems Quiz — POLITEHNICA București</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f2f1ee;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-muted: #6b6b66;
    --text-hint: #999992;
    --accent: #4f46e5;
    --accent-light: #eeedfe;
    --accent-border: #afa9ec;
    --success: #0f6e56;
    --success-bg: #e1f5ee;
    --success-border: #5dcaa5;
    --danger: #a32d2d;
    --danger-bg: #fcebeb;
    --danger-border: #f09595;
    --warning: #854f0b;
    --warning-bg: #faeeda;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface2: #2e2e2b;
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.18);
      --text: #f0efe8;
      --text-muted: #a8a89f;
      --text-hint: #666660;
      --accent: #7f77dd;
      --accent-light: #26215c;
      --accent-border: #534ab7;
      --success: #9fe1cb;
      --success-bg: #04342c;
      --success-border: #0f6e56;
      --danger: #f09595;
      --danger-bg: #501313;
      --danger-border: #a32d2d;
      --warning: #fac775;
      --warning-bg: #412402;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .header-left p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .progress-ring {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .score-badge {
    background: var(--accent-light);
    color: var(--accent);
    border: 0.5px solid var(--accent-border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 500;
  }

  #progress-bar-wrap {
    width: 120px;
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-text {
    font-size: 13px;
    color: var(--text-muted);
    min-width: 50px;
    text-align: right;
  }

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  .topic-filter {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.75rem;
  }

  .topic-btn {
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    color: var(--text-muted);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .topic-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .topic-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }

  .quiz-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    gap: 12px;
    flex-wrap: wrap;
  }

  .controls-left {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 7px 16px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.98); }

  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .btn-accent:hover { opacity: 0.9; background: var(--accent); }

  .mode-toggle {
    display: flex;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 3px;
    gap: 2px;
  }

  .mode-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .mode-btn.active {
    background: var(--surface);
    color: var(--text);
    font-weight: 500;
    box-shadow: 0 0 0 0.5px var(--border);
  }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.75rem;
  }

  .stat {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .stat.correct .stat-num { color: var(--success); }
  .stat.wrong .stat-num { color: var(--danger); }
  .stat.skipped .stat-num { color: var(--text-muted); }

  .question-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }

  .question-card.answered-correct {
    border-color: var(--success-border);
    background: var(--success-bg);
  }

  .question-card.answered-wrong {
    border-color: var(--danger-border);
    background: var(--danger-bg);
  }

  .q-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .q-topic-tag {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent);
    background: var(--accent-light);
    border: 0.5px solid var(--accent-border);
    border-radius: 12px;
    padding: 2px 10px;
  }

  .q-type-tag {
    font-size: 12px;
    color: var(--text-hint);
  }

  .q-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 1rem;
    color: var(--text);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg);
    user-select: none;
  }

  .option:hover {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .option.selected {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .option.correct {
    border-color: var(--success-border);
    background: var(--success-bg);
  }

  .option.wrong {
    border-color: var(--danger-border);
    background: var(--danger-bg);
  }

  .option.revealed-correct {
    border-color: var(--success-border);
    background: var(--success-bg);
  }

  .option-marker {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    transition: all 0.15s;
  }

  .option.selected .option-marker {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .option.correct .option-marker,
  .option.revealed-correct .option-marker {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }

  .option.wrong .option-marker {
    background: var(--danger);
    border-color: var(--danger);
    color: #fff;
  }

  .multi-marker {
    border-radius: 4px;
  }

  .option-text {
    font-size: 14px;
    line-height: 1.5;
    padding-top: 1px;
  }

  .q-actions {
    display: flex;
    gap: 8px;
    margin-top: 1rem;
  }

  .feedback-msg {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    display: none;
  }

  .feedback-msg.show { display: block; }

  .feedback-msg.correct {
    background: var(--success-bg);
    color: var(--success);
    border: 0.5px solid var(--success-border);
  }

  .feedback-msg.wrong {
    background: var(--danger-bg);
    color: var(--danger);
    border: 0.5px solid var(--danger-border);
  }

  .flashcard-view { display: none; }

  .flashcard {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    text-align: center;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s;
    margin-bottom: 1rem;
    position: relative;
  }

  .flashcard:hover { border-color: var(--accent); }

  .fc-side-label {
    position: absolute;
    top: 14px;
    left: 18px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-hint);
  }

  .fc-question {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 0.5rem;
  }

  .fc-hint {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 0.75rem;
  }

  .fc-answer {
    display: none;
  }

  .fc-answer.visible {
    display: block;
  }

  .fc-answer-text {
    font-size: 15px;
    color: var(--success);
    font-weight: 500;
    line-height: 1.5;
  }

  .fc-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 0.5rem;
  }

  .fc-counter {
    font-size: 14px;
    color: var(--text-muted);
    min-width: 80px;
    text-align: center;
  }

  .results-screen {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
  }

  .results-screen.show { display: block; }

  .result-score {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -2px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
  }

  .result-label {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .result-sub {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 2rem;
  }

  .result-breakdown {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin: 1.5rem 0 2rem;
    flex-wrap: wrap;
  }

  .rb-item { text-align: center; }
  .rb-num { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
  .rb-label { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
  }

  .source-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 4px;
    width: fit-content;
  }

  .source-tab {
    background: transparent;
    border: none;
    color: var(--text-muted);
    border-radius: calc(var(--radius) - 2px);
    padding: 8px 22px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .source-tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 0 0 0.5px var(--border);
  }

  .source-tab:hover:not(.active) { color: var(--text); }

  .step-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    margin-bottom: 1rem;
    transition: border-color 0.3s, background 0.3s;
  }

  .step-card.answered-correct {
    border-color: var(--success-border);
    background: var(--success-bg);
  }

  .step-card.answered-wrong {
    border-color: var(--danger-border);
    background: var(--danger-bg);
  }

  .step-q-num {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-hint);
    margin-bottom: 6px;
  }

  .step-q-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 1.5rem;
    color: var(--text);
  }

  .step-type-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
  }

  .step-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .step-option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg);
    user-select: none;
  }

  .step-option:hover { border-color: var(--accent); background: var(--accent-light); }
  .step-option.selected { border-color: var(--accent); background: var(--accent-light); }
  .step-option.correct { border-color: var(--success-border); background: var(--success-bg); }
  .step-option.wrong { border-color: var(--danger-border); background: var(--danger-bg); }
  .step-option.revealed-correct { border-color: var(--success-border); background: var(--success-bg); }
  .step-option.locked { cursor: default; }

  .step-option-marker {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.15s;
  }

  .step-option.selected .step-option-marker { background: var(--accent); border-color: var(--accent); color: #fff; }
  .step-option.correct .step-option-marker,
  .step-option.revealed-correct .step-option-marker { background: var(--success); border-color: var(--success); color: #fff; }
  .step-option.wrong .step-option-marker { background: var(--danger); border-color: var(--danger); color: #fff; }

  .step-option-marker.sq { border-radius: 5px; }

  .step-option-text { font-size: 15px; line-height: 1.5; padding-top: 1px; }

  .step-feedback {
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    margin-bottom: 1.25rem;
    display: none;
    line-height: 1.5;
  }

  .step-feedback.show { display: block; }
  .step-feedback.correct { background: var(--success-bg); color: var(--success); border: 0.5px solid var(--success-border); }
  .step-feedback.wrong { background: var(--danger-bg); color: var(--danger); border: 0.5px solid var(--danger-border); }

  .step-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }

  .step-nav-left { display: flex; gap: 8px; }

  .step-dot-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 1.5rem;
    max-height: 56px;
    overflow: hidden;
  }

  .step-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--surface2);
    border: 0.5px solid var(--border-strong);
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .step-dot.current { background: var(--accent); border-color: var(--accent); }
  .step-dot.dot-correct { background: var(--success); border-color: var(--success); }
  .step-dot.dot-wrong { background: var(--danger); border-color: var(--danger); }

  @media (max-width: 560px) {
    header { padding: 1rem; flex-wrap: wrap; gap: 8px; }
    main { padding: 1.25rem 1rem 3rem; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .question-card { padding: 1.1rem; }
    .step-card { padding: 1.25rem; }
    .step-q-text { font-size: 16px; }
    #progress-bar-wrap { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Embedded Systems Quiz</h1>
    <p>POLITEHNICA București — All lecture topics</p>
  </div>
  <div class="progress-ring">
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <span class="progress-text" id="progress-text">0 / 0</span>
    <span class="score-badge" id="score-badge">Score: 0%</span>
  </div>
</header>

<main>
  <div class="source-tabs">
    <button class="source-tab active" onclick="setSource('tests')" id="src-tests">📝 Past Tests</button>
    <button class="source-tab" onclick="setSource('notes')" id="src-notes">📖 Lecture Notes</button>
  </div>

  <div class="topic-filter" id="topic-filter"></div>

  <div class="quiz-controls">
    <div class="controls-left">
      <button class="btn btn-accent" onclick="shuffleQuestions()">⟳ Shuffle</button>
      <button class="btn" onclick="resetAll()" id="reset-btn">Reset</button>
      <button class="btn" onclick="showResults()">Results</button>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('quiz')" id="mode-quiz">All questions</button>
      <button class="mode-btn" onclick="setMode('step')" id="mode-step">One by one</button>
      <button class="mode-btn" onclick="setMode('flashcard')" id="mode-flashcard">Flashcards</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Wrong</div></div>
    <div class="stat skipped"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div id="quiz-view"></div>

  <div class="flashcard-view" id="flashcard-view">
    <div class="flashcard" id="fc-card" onclick="toggleFlashcard()">
      <span class="fc-side-label" id="fc-side-label">Question</span>
      <div class="fc-question" id="fc-question"></div>
      <div class="fc-hint" id="fc-hint">Click to reveal answer</div>
      <div class="fc-answer" id="fc-answer">
        <div class="fc-answer-text" id="fc-answer-text"></div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="btn" onclick="fcNav(-1)">← Prev</button>
      <span class="fc-counter" id="fc-counter">1 / 1</span>
      <button class="btn" onclick="fcNav(1)">Next →</button>
    </div>
  </div>

  <div class="step-view" id="step-view">
    <div class="step-dot-row" id="step-dot-row"></div>
    <div id="step-card-wrap"></div>
  </div>

  <div class="results-screen" id="results-screen">
    <div class="result-score" id="res-pct">0%</div>
    <div class="result-label" id="res-label">Keep practising!</div>
    <div class="result-sub" id="res-sub"></div>
    <div class="result-breakdown">
      <div class="rb-item"><div class="rb-num" style="color:var(--success)" id="res-correct">0</div><div class="rb-label">Correct</div></div>
      <div class="rb-item"><div class="rb-num" style="color:var(--danger)" id="res-wrong">0</div><div class="rb-label">Wrong</div></div>
      <div class="rb-item"><div class="rb-num" style="color:var(--text-muted)" id="res-skip">0</div><div class="rb-label">Skipped</div></div>
    </div>
    <button class="btn btn-accent" onclick="resetAll()">Try again</button>
  </div>
</main>

<script>
const ALL_QUESTIONS = [
  {
    topic: "Lecture 1 — Hardware Basics",
    type: "single",
    q: "What is a register?",
    options: ["A variable inside a processor", "A cache memory", "A journal file", "A database"],
    correct: [0]
  },
  {
    topic: "Lecture 1 — Hardware Basics",
    type: "multi",
    q: "What are the actions (instructions) that a processor can perform?",
    options: ["Memory access", "Draw on a screen", "Control hardware", "Math"],
    correct: [0, 3]
  },
  {
    topic: "Lecture 1 — Hardware Basics",

let questions = [...ALL_QUESTIONS];
let answers = {};   // keyed by question text — persists across topic switches
let currentTopic = "All";
let currentSource = "tests"; // "tests" or "notes"
let mode = "quiz";
let fcIndex = 0;
let fcRevealed = false;
let stepIndex = 0;
let stepSelected = [];

const topics = ["All", ...new Set(ALL_QUESTIONS.map(q => q.topic))];
const SAVE_KEY = "esQuizSession_v2";

// Derive per-index state from global answers for the current question list
function getState(qi) { return answers[questions[qi].q]; }
function setState(qi, val) { answers[questions[qi].q] = val; }

function saveSession() {
  try {
    const questionKeys = questions.map(q => q.q);
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      currentTopic, currentSource, mode, stepIndex, fcIndex,
      questionOrder: questions.map(q => q.q),
      answers
    }));
  } catch(e) {}
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const saved = JSON.parse(raw);
    currentTopic = saved.currentTopic || "All";
    currentSource = saved.currentSource || "tests";
    mode = saved.mode || "quiz";
    stepIndex = saved.stepIndex || 0;
    fcIndex = saved.fcIndex || 0;
    answers = saved.answers || {};
    // Restore question order
    const order = saved.questionOrder || [];
    if (order.length > 0) {
      const pool = currentSource === "tests" ? ALL_QUESTIONS : NOTES_QUESTIONS;
      const base = currentTopic === "All" ? pool : pool.filter(q => q.topic === currentTopic);
      const reordered = [];
      order.forEach(k => { const f = base.find(q => q.q === k); if (f) reordered.push(f); });
      base.forEach(q => { if (!reordered.includes(q)) reordered.push(q); });
      questions = reordered;
    }
    return true;
  } catch(e) { return false; }
}

function clearSession() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

function init() {
  const restored = loadSession();
  document.getElementById("src-tests").classList.toggle("active", currentSource === "tests");
  document.getElementById("src-notes").classList.toggle("active", currentSource === "notes");
  renderTopicFilter();
  if (restored) {
    updateStats();
    document.getElementById("mode-quiz").classList.toggle("active", mode === "quiz");
    document.getElementById("mode-step").classList.toggle("active", mode === "step");
    document.getElementById("mode-flashcard").classList.toggle("active", mode === "flashcard");
    document.getElementById("quiz-view").style.display = mode === "quiz" ? "block" : "none";
    document.getElementById("step-view").style.display = mode === "step" ? "block" : "none";
    document.getElementById("flashcard-view").style.display = mode === "flashcard" ? "block" : "none";
    if (mode === "quiz") renderQuiz();
    else if (mode === "step") { stepSelected = []; renderStep(); }
    else renderFlashcard();
    showToast("Progress restored ✓");
  } else {
    resetAll();
  }
}

function activePool() {
  return currentSource === "tests" ? ALL_QUESTIONS : NOTES_QUESTIONS;
}

function setSource(src) {
  currentSource = src;
  currentTopic = "All";
  stepIndex = 0;
  stepSelected = [];
  document.getElementById("src-tests").classList.toggle("active", src === "tests");
  document.getElementById("src-notes").classList.toggle("active", src === "notes");
  questions = [...activePool()];
  renderTopicFilter();
  updateStats();
  saveSession();
  document.getElementById("results-screen").classList.remove("show");
  document.getElementById("quiz-view").style.display = mode === "quiz" ? "block" : "none";
  document.getElementById("step-view").style.display = mode === "step" ? "block" : "none";
  document.getElementById("flashcard-view").style.display = mode === "flashcard" ? "block" : "none";
  if (mode === "quiz") renderQuiz();
  else if (mode === "step") renderStep();
  else { fcIndex = 0; renderFlashcard(); }
}

function updateResetBtn() {
  const btn = document.getElementById("reset-btn");
  if (!btn) return;
  btn.textContent = currentTopic === "All" ? "Reset all" : "Reset section";
}

function renderTopicFilter() {
  const pool = activePool();
  const topics = ["All", ...new Set(pool.map(q => q.topic))];
  const wrap = document.getElementById("topic-filter");
  wrap.innerHTML = topics.map(t =>
    `<button class="topic-btn${t === currentTopic ? " active" : ""}" onclick="setTopic('${t.replace(/'/g,"\\'")}')">
      ${t === "All" ? "All topics" : t.replace(/L(?:ecture)? \d+\/?[\d]* [—–-] /, "").replace(/^L\d+ — /, "")}
    </button>`
  ).join("");
  updateResetBtn();
}

function setTopic(t) {
  currentTopic = t;
  renderTopicFilter();
  filterAndRender();
}

function filterAndRender() {
  const pool = activePool();
  questions = currentTopic === "All"
    ? [...pool]
    : pool.filter(q => q.topic === currentTopic);
  stepIndex = 0;
  stepSelected = [];
  updateStats();
  saveSession();
  if (mode === "quiz") renderQuiz();
  else if (mode === "step") renderStep();
  else { fcIndex = 0; renderFlashcard(); }
}

function shuffleQuestions() {
  questions = [...questions].sort(() => Math.random() - 0.5);
  stepIndex = 0;
  stepSelected = [];
  updateStats();
  saveSession();
  if (mode === "quiz") renderQuiz();
  else if (mode === "step") renderStep();
  else { fcIndex = 0; renderFlashcard(); }
}

function resetAll() {
  const pool = activePool();
  questions = currentTopic === "All"
    ? [...pool]
    : pool.filter(q => q.topic === currentTopic);
  // Only delete answers for questions in the current view
  questions.forEach(q => { delete answers[q.q]; });
  // If all questions are now unanswered, also clear the full save
  if (Object.keys(answers).length === 0) clearSession();
  stepIndex = 0;
  stepSelected = [];
  updateStats();
  saveSession();
  document.getElementById("results-screen").classList.remove("show");
  document.getElementById("quiz-view").style.display = mode === "quiz" ? "block" : "none";
  document.getElementById("step-view").style.display = mode === "step" ? "block" : "none";
  document.getElementById("flashcard-view").style.display = mode === "flashcard" ? "block" : "none";
  if (mode === "quiz") renderQuiz();
  else if (mode === "step") renderStep();
  else { fcIndex = 0; fcRevealed = false; renderFlashcard(); }
}

function setMode(m) {
  mode = m;
  document.getElementById("mode-quiz").classList.toggle("active", m === "quiz");
  document.getElementById("mode-step").classList.toggle("active", m === "step");
  document.getElementById("mode-flashcard").classList.toggle("active", m === "flashcard");
  document.getElementById("quiz-view").style.display = m === "quiz" ? "block" : "none";
  document.getElementById("step-view").style.display = m === "step" ? "block" : "none";
  document.getElementById("flashcard-view").style.display = m === "flashcard" ? "block" : "none";
  document.getElementById("results-screen").classList.remove("show");
  saveSession();
  if (m === "flashcard") { fcIndex = 0; fcRevealed = false; renderFlashcard(); }
  else if (m === "step") { stepIndex = 0; stepSelected = []; renderStep(); }
  else renderQuiz();
}

function renderQuiz() {
  const view = document.getElementById("quiz-view");
  if (questions.length === 0) {
    view.innerHTML = '<div class="empty-state">No questions match this filter.</div>';
    return;
  }
  view.innerHTML = questions.map((q, i) => renderQuestion(q, i)).join("");
}

function renderQuestion(q, i) {
  const s = getState(i);
  let cardClass = "question-card";
  if (s) {
    cardClass += s.correct ? " answered-correct" : " answered-wrong";
  }

  const optionsHtml = q.options.map((opt, j) => {
    let cls = "option";
    let markerContent = "";
    const isMulti = q.type === "multi";

    if (s) {
      const isCorrect = q.correct.includes(j);
      const wasSelected = s.selected.includes(j);
      if (isCorrect) cls += " revealed-correct";
      if (wasSelected && !isCorrect) cls += " wrong";
      if (wasSelected && isCorrect) cls += " correct";
    } else if (s === undefined) {
    }

    const markerCls = "option-marker" + (isMulti ? " multi-marker" : "");
    if (s) {
      const isCorrect = q.correct.includes(j);
      const wasSelected = s.selected.includes(j);
      if (isCorrect) markerContent = "✓";
      if (wasSelected && !isCorrect) markerContent = "✗";
    }

    return `<div class="${cls}" onclick="selectOption(${i}, ${j})" data-q="${i}" data-o="${j}">
      <span class="${markerCls}">${markerContent}</span>
      <span class="option-text">${opt}</span>
    </div>`;
  }).join("");

  const typeLabel = q.type === "multi" ? "Select all that apply" : "Select one";
  const topicShort = q.topic.replace(/Lecture \d+\/?[\d]* — /, "");

  let feedback = "";
  if (s) {
    feedback = `<div class="feedback-msg ${s.correct ? "correct" : "wrong"} show">
      ${s.correct
        ? "✓ Correct!"
        : `✗ Incorrect. Correct answer${q.correct.length > 1 ? "s" : ""}: <strong>${q.correct.map(c => q.options[c]).join(", ")}</strong>`
      }
    </div>`;
  }

  let actionBtn = "";
  if (!s && q.type === "multi") {
    actionBtn = `<button class="btn btn-accent" onclick="submitMulti(${i})" id="submit-${i}">Check answer</button>`;
  }

  return `<div class="${cardClass}" id="q-card-${i}">
    <div class="q-meta">
      <span class="q-topic-tag">${topicShort}</span>
      <span class="q-type-tag">${typeLabel}</span>
    </div>
    <div class="q-text">${i + 1}. ${q.q}</div>
    <div class="options" id="opts-${i}">${optionsHtml}</div>
    <div class="q-actions">${actionBtn}</div>
    ${feedback}
  </div>`;
}

function selectOption(qi, oi) {
  if (getState(qi)) return;
  const q = questions[qi];
  if (q.type === "single") {
    const selected = [oi];
    const correct = arraysMatch(selected, q.correct);
    setState(qi, { selected, correct });
    updateCard(qi);
    updateStats();
    saveSession();
  } else {
    const card = document.getElementById(`q-card-${qi}`);
    const opt = card.querySelectorAll(".option")[oi];
    opt.classList.toggle("selected");
    const marker = opt.querySelector(".option-marker");
    if (opt.classList.contains("selected")) {
      marker.textContent = "✓";
    } else {
      marker.textContent = "";
    }
  }
}

function submitMulti(qi) {
  if (getState(qi)) return;
  const q = questions[qi];
  const card = document.getElementById(`q-card-${qi}`);
  const selected = [];
  card.querySelectorAll(".option").forEach((el, j) => {
    if (el.classList.contains("selected")) selected.push(j);
  });
  if (selected.length === 0) return;
  const correct = arraysMatch(selected, q.correct);
  setState(qi, { selected, correct });
  updateCard(qi);
  updateStats();
  saveSession();
}

function arraysMatch(a, b) {
  const sa = [...a].sort();
  const sb = [...b].sort();
  return sa.length === sb.length && sa.every((v, i) => v === sb[i]);
}

function updateCard(qi) {
  const card = document.getElementById(`q-card-${qi}`);
  if (!card) return;
  card.outerHTML = renderQuestion(questions[qi], qi);
}

function updateStats() {
  const answered = questions.map((q, i) => getState(i)).filter(Boolean);
  const correct = answered.filter(s => s.correct).length;
  const wrong = answered.filter(s => !s.correct).length;
  const remaining = questions.length - answered.length;
  const total = questions.length;
  const pct = answered.length > 0 ? Math.round((correct / answered.length) * 100) : 0;

  document.getElementById("stat-correct").textContent = correct;
  document.getElementById("stat-wrong").textContent = wrong;
  document.getElementById("stat-remaining").textContent = remaining;
  document.getElementById("stat-total").textContent = total;

  const progress = total > 0 ? ((answered.length / total) * 100) : 0;
  document.getElementById("progress-bar").style.width = progress + "%";
  document.getElementById("progress-text").textContent = `${answered.length} / ${total}`;
  document.getElementById("score-badge").textContent = `Score: ${pct}%`;
}

function showResults() {
  const answered = questions.map((q, i) => getState(i)).filter(Boolean);
  const correct = answered.filter(s => s.correct).length;
  const wrong = answered.filter(s => !s.correct).length;
  const skip = questions.length - answered.length;
  const pct = answered.length > 0 ? Math.round((correct / answered.length) * 100) : 0;

  document.getElementById("res-pct").textContent = pct + "%";
  document.getElementById("res-correct").textContent = correct;
  document.getElementById("res-wrong").textContent = wrong;
  document.getElementById("res-skip").textContent = skip;

  let label = "Keep going!";
  if (pct >= 90) label = "Excellent work!";
  else if (pct >= 75) label = "Good job!";
  else if (pct >= 60) label = "Getting there!";
  else if (answered.length === 0) label = "No answers yet";

  document.getElementById("res-label").textContent = label;
  document.getElementById("res-sub").textContent =
    `${correct} correct out of ${answered.length} answered (${skip} skipped)`;

  document.getElementById("quiz-view").style.display = "none";
  document.getElementById("step-view").style.display = "none";
  document.getElementById("flashcard-view").style.display = "none";
  document.getElementById("results-screen").classList.add("show");
}

function renderFlashcard() {
  const q = questions[fcIndex];
  if (!q) return;
  document.getElementById("fc-question").textContent = q.q;
  document.getElementById("fc-counter").textContent = `${fcIndex + 1} / ${questions.length}`;
  document.getElementById("fc-hint").style.display = "block";
  const ans = document.getElementById("fc-answer");
  const ansText = document.getElementById("fc-answer-text");
  ans.classList.remove("visible");
  ansText.textContent = q.correct.map(c => q.options[c]).join(" | ");
  document.getElementById("fc-side-label").textContent = "Question";
  fcRevealed = false;
}

function toggleFlashcard() {
  fcRevealed = !fcRevealed;
  const ans = document.getElementById("fc-answer");
  const hint = document.getElementById("fc-hint");
  const label = document.getElementById("fc-side-label");
  if (fcRevealed) {
    ans.classList.add("visible");
    hint.style.display = "none";
    label.textContent = "Answer";
  } else {
    ans.classList.remove("visible");
    hint.style.display = "block";
    label.textContent = "Question";
  }
}

function fcNav(dir) {
  fcIndex = (fcIndex + dir + questions.length) % questions.length;
  renderFlashcard();
}

function renderStep() {
  if (questions.length === 0) {
    document.getElementById("step-card-wrap").innerHTML = '<div class="empty-state">No questions match this filter.</div>';
    return;
  }
  renderStepDots();
  renderStepCard();
}

function renderStepDots() {
  const row = document.getElementById("step-dot-row");
  row.innerHTML = questions.map((q, i) => {
    const s = getState(i);
    let cls = "step-dot";
    if (i === stepIndex) cls += " current";
    else if (s && s.correct) cls += " dot-correct";
    else if (s && !s.correct) cls += " dot-wrong";
    return `<div class="${cls}" onclick="jumpStep(${i})" title="Question ${i+1}"></div>`;
  }).join("");
}

function jumpStep(i) {
  stepIndex = i;
  stepSelected = [];
  const s = getState(i);
  if (s) stepSelected = [...s.selected];
  saveSession();
  renderStepDots();
  renderStepCard();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderStepCard() {
  const wrap = document.getElementById("step-card-wrap");
  const q = questions[stepIndex];
  const s = getState(stepIndex);
  const isAnswered = !!s;
  const isMulti = q.type === "multi";
  const topicShort = q.topic.replace(/Lecture \d+\/?[\d]* — /, "");

  let cardClass = "step-card";
  if (isAnswered) cardClass += s.correct ? " answered-correct" : " answered-wrong";

  const optionsHtml = q.options.map((opt, j) => {
    let cls = "step-option";
    let markerContent = "";
    const markerCls = "step-option-marker" + (isMulti ? " sq" : "");

    if (isAnswered) {
      const isCorrect = q.correct.includes(j);
      const wasSelected = s.selected.includes(j);
      if (isCorrect) cls += " revealed-correct locked";
      if (wasSelected && !isCorrect) cls += " wrong locked";
      if (wasSelected && isCorrect) cls += " correct locked";
      if (!wasSelected && !isCorrect) cls += " locked";
      if (isCorrect) markerContent = "✓";
      if (wasSelected && !isCorrect) markerContent = "✗";
    } else {
      if (stepSelected.includes(j)) cls += " selected";
      if (stepSelected.includes(j)) markerContent = isMulti ? "✓" : "";
    }

    const onclick = isAnswered ? "" : `onclick="stepSelectOption(${j})"`;
    return `<div class="${cls}" ${onclick}>
      <span class="${markerCls}">${markerContent}</span>
      <span class="step-option-text">${opt}</span>
    </div>`;
  }).join("");

  let feedbackHtml = "";
  if (isAnswered) {
    feedbackHtml = `<div class="step-feedback ${s.correct ? "correct" : "wrong"} show">
      ${s.correct
        ? "✓ Correct!"
        : `✗ Incorrect. Correct answer${q.correct.length > 1 ? "s" : ""}: <strong>${q.correct.map(c => q.options[c]).join(", ")}</strong>`
      }
    </div>`;
  }

  let submitBtn = "";
  if (!isAnswered && isMulti) {
    submitBtn = `<button class="btn btn-accent" onclick="stepSubmitMulti()">Check answer</button>`;
  }

  let nextBtn = "";
  if (isAnswered) {
    if (stepIndex < questions.length - 1) {
      nextBtn = `<button class="btn btn-accent" onclick="stepNext()">Next question →</button>`;
    } else {
      nextBtn = `<button class="btn btn-accent" onclick="showResults()">See results →</button>`;
    }
  }

  let prevBtn = stepIndex > 0
    ? `<button class="btn" onclick="stepPrev()">← Prev</button>`
    : `<button class="btn" disabled style="opacity:0.4;cursor:default">← Prev</button>`;

  const counter = `<span style="font-size:13px;color:var(--text-muted)">${stepIndex + 1} / ${questions.length}</span>`;
  const topicTag = `<span class="q-topic-tag" style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);background:var(--accent-light);border:0.5px solid var(--accent-border);border-radius:12px;padding:2px 10px;">${topicShort}</span>`;

  wrap.innerHTML = `<div class="${cardClass}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px">
      ${topicTag}
      <span style="font-size:12px;color:var(--text-muted)">${isMulti ? "Select all that apply" : "Select one"}</span>
    </div>
    <div class="step-q-num">Question ${stepIndex + 1} of ${questions.length}</div>
    <div class="step-q-text">${q.q}</div>
    <div class="step-options">${optionsHtml}</div>
    ${submitBtn ? `<div style="margin-bottom:1rem">${submitBtn}</div>` : ""}
    ${feedbackHtml}
    <div class="step-nav">
      <div class="step-nav-left">
        ${prevBtn}
        ${nextBtn}
      </div>
      ${counter}
    </div>
  </div>`;
}

function stepSelectOption(oi) {
  const q = questions[stepIndex];
  if (q.type === "single") {
    stepSelected = [oi];
    const correct = arraysMatch(stepSelected, q.correct);
    setState(stepIndex, { selected: stepSelected, correct });
    updateStats();
    saveSession();
    renderStepDots();
    renderStepCard();
  } else {
    if (stepSelected.includes(oi)) {
      stepSelected = stepSelected.filter(x => x !== oi);
    } else {
      stepSelected = [...stepSelected, oi];
    }
    renderStepCard();
  }
}

function stepSubmitMulti() {
  if (stepSelected.length === 0) return;
  const q = questions[stepIndex];
  const correct = arraysMatch(stepSelected, q.correct);
  setState(stepIndex, { selected: [...stepSelected], correct });
  updateStats();
  saveSession();
  renderStepDots();
  renderStepCard();
}

function stepNext() {
  if (stepIndex < questions.length - 1) {
    stepIndex++;
    const s = getState(stepIndex);
    stepSelected = s ? [...s.selected] : [];
    saveSession();
    renderStepDots();
    renderStepCard();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
}

function stepPrev() {
  if (stepIndex > 0) {
    stepIndex--;
    const s = getState(stepIndex);
    stepSelected = s ? [...s.selected] : [];
    saveSession();
    renderStepDots();
    renderStepCard();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
}

function showToast(msg) {
  const t = document.createElement("div");
  t.textContent = msg;
  t.style.cssText = "position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:1;transition:opacity 0.4s";
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = "0"; setTimeout(() => t.remove(), 400); }, 2000);
}

init();
</script>
</body>
</html>
